minimum_prek_version = "0.3.10"

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "ruff-check",
    name = "ruff check",
    entry = "uv run ruff check --fix",
    language = "system",
    types = ["python"],
  },
  {
    id = "ruff-format",
    name = "ruff format",
    entry = "uv run ruff format",
    language = "system",
    types = ["python"],
  },
  {
    id = "vite-plus-check",
    name = "vite+ check",
    entry = "sh -c 'cd frontend && npm run check -- --fix'",
    language = "system",
    files = "^frontend/(src/.*|index\\.html|package(-lock)?\\.json|vite\\.config\\.ts|tsconfig.*\\.json)$",
    pass_filenames = false,
  },
  {
    id = "ty-check",
    name = "ty check",
    entry = "uv run ty check",
    language = "system",
    files = "^(app|tests|scripts)/.*\\.py$|^pyproject\\.toml$",
    pass_filenames = false,
  },
]
